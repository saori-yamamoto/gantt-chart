          cell.style.gridColumn = String(day + 3);
          cell.style.gridRow = String(row);
          const ariaProject = task.project ? `${task.project} ` : "";
          cell.setAttribute("aria-label", `${ariaProject}${task.name || "タスク"} ${month + 1}月${day}日`);
          cell.setAttribute("aria-pressed", task.checks[dateKey] ? "true" : "false");
          cell.addEventListener("click", () => {
            rememberState();
            reportDateInput.value = dateKey;
            if (task.checks[dateKey]) {
              delete task.checks[dateKey];
            } else {
              task.checks[dateKey] = true;
            }
            saveState();
            render();
          });
          board.appendChild(cell);
        }
      });
      renderReport();
      renderProjectManager();
    }

    function escapeAttr(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function clearVisibleMonthChecks() {
      if (!window.confirm("今月分のプロジェクト・タスク・チェックをすべて削除します。よろしいですか？")) return;
      rememberState();
      ensureMonth().tasks = blankTasks();
      saveState();
      render();
    }

    function removeBlankRows() {
      rememberState();
      const monthRecord = ensureMonth();
      monthRecord.tasks = monthRecord.tasks.filter(task => task.project.trim() || task.name.trim() || Object.keys(task.checks).length);
      if (!monthRecord.tasks.length) monthRecord.tasks = blankTasks();
      saveState();
      render();
    }

    function copyPreviousMonthTasks() {
      rememberState();
      const currentMonth = selectedMonthKey();
      const previousMonth = previousMonthKey(currentMonth);
      const sourceRecord = state.months && state.months[previousMonth]
        ? normalizeMonthRecord(state.months[previousMonth])
        : { tasks: [] };
      const sourceTasks = sourceRecord.tasks;
      const copiedTasks = sourceTasks
        .filter(task => task.project.trim() || task.name.trim())
        .map(task => makeTask(task.project, task.name));

      ensureMonth(currentMonth).tasks = copiedTasks.length
        ? [...copiedTasks, makeTask("", ""), makeTask("", "")]
        : blankTasks();

      saveState();
      render();
    }

    function switchView(view) {
      state.activeView = view;
      saveState();
      render();
    }

    function addProjectItem() {
      rememberState();
      const monthKey = selectedMonthKey();
      ensureProjectItems().push(makeProjectItem("", {
        status: "active",
        priority: "中",
        startDate: `${monthKey}-01`,
        dueDate: endOfMonthKey(monthKey),
        progress: 0,
        nextAction: ""
      }));
      saveState();
      render();
    }

    function importProjectsFromGantt() {
      const projects = ensureProjectItems();
      const existing = new Map(projects.map(project => [project.name.trim(), project]).filter(([name]) => name));
      const additions = [];
      const groups = projectGroups().filter(group => group.key);

      if (!groups.length) {
        window.alert("ガント側に反映できるプロジェクトがありません。");
        return;
      }

      rememberState();
      groups.forEach(group => {
        const progress = checkedProgressForProject(group.key);
        const taskNames = ganttTasksForProject(group.key);
        const nextAction = taskNames[0] || "";
        const existingProject = existing.get(group.key);

        if (existingProject) {
          existingProject.progress = progress;
          if (progress >= 100 || existingProject.status === "active" || existingProject.status === "not-started") {
            existingProject.status = statusForProgress(progress);
          }
          if (!existingProject.nextAction.trim() && nextAction) existingProject.nextAction = nextAction;
          return;
        }

        additions.push(makeProjectItem(group.key, {
          status: statusForProgress(progress),
          priority: "中",
          startDate: `${selectedMonthKey()}-01`,
          dueDate: endOfMonthKey(selectedMonthKey()),
          progress,
          nextAction
        }));
        existing.set(group.key, additions[additions.length - 1]);
      });

      state.projectItems.push(...additions);
      saveState();
      render();
    }

    monthInput.value = state.month || currentMonthValue();
    ensureMonth(monthInput.value);
    ensureProjectItems();
    reportDateInput.value = state.reportDate || preferredReportDate(monthInput.value);
    showGanttButton.addEventListener("click", () => switchView("gantt"));
    showProjectsButton.addEventListener("click", () => switchView("projects"));
    monthInput.addEventListener("change", () => {
      changeMonth(monthInput.value);
    });
    document.getElementById("prevMonth").addEventListener("click", () => {
      changeMonth(shiftMonthKey(selectedMonthKey(), -1));
    });
    document.getElementById("currentMonth").addEventListener("click", () => {
      changeMonth(currentMonthValue());
    });
    document.getElementById("nextMonth").addEventListener("click", () => {
      changeMonth(shiftMonthKey(selectedMonthKey(), 1));
    });
    reportDateInput.addEventListener("change", () => {
      saveState();
      renderReport();
    });
    document.getElementById("addRow").addEventListener("click", () => {
      rememberState();
      currentTasks().push(makeTask("", ""));
      saveState();
      render();
    });
    document.getElementById("copyPreviousMonth").addEventListener("click", copyPreviousMonthTasks);
    document.getElementById("removeBlankRows").addEventListener("click", removeBlankRows);
    document.getElementById("clearMonth").addEventListener("click", clearVisibleMonthChecks);
    document.getElementById("printButton").addEventListener("click", () => window.print());
    document.getElementById("addProject").addEventListener("click", addProjectItem);
    document.getElementById("importProjects").addEventListener("click", importProjectsFromGantt);
    document.getElementById("printProjects").addEventListener("click", () => window.print());
    copyReportButton.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(reportText.value);
      } catch (error) {
        reportText.select();
        document.execCommand("copy");
      }
      copyReportButton.textContent = "コピー済み";
      window.setTimeout(() => {
        copyReportButton.textContent = "コピー";
      }, 1200);
    });
    document.addEventListener("keydown", event => {
      const key = event.key.toLowerCase();
      const modifier = event.metaKey || event.ctrlKey;
      const undo = modifier && key === "z" && !event.shiftKey;
      const redo = modifier && ((key === "z" && event.shiftKey) || key === "y");

      if ((!undo && !redo) || isEditingText(event)) return;

      event.preventDefault();
      if (undo) undoState();
      if (redo) redoState();
    });

    render();
  </script>
</body>
</html>
